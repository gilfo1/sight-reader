<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sight-reader</title>
  </head>
  <body style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 20px;">
    <div style="width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center;">
      <div style="display: flex; gap: 10px; justify-content: center; align-items: flex-start; flex-wrap: wrap; width: 100%; margin-bottom: 20px;">
        <details id="settings-details" open style="border: 1px solid #ccc; border-radius: 8px; padding: 10px; background: #f9f9f9; width: fit-content;">
          <summary style="cursor: pointer; font-weight: bold; color: #444; text-align: center;">Settings</summary>
          <div id="controls" style="margin-top: 15px; display: flex; flex-direction: column; gap: 15px; align-items: flex-start; width: 100%; box-sizing: border-box;">
          <div style="display: flex; gap: 15px; flex-wrap: wrap;">
            <div>
              <label for="measures-per-line">Measures per Line:</label>
              <select id="measures-per-line">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
              </select>
            </div>
            <div>
              <label for="lines">Lines:</label>
              <select id="lines">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </div>
            <div>
              <label for="staff-type">Staff Type:</label>
              <select id="staff-type">
                <option value="grand" selected>Grand Staff</option>
                <option value="treble">Treble Clef</option>
                <option value="bass">Bass Clef</option>
              </select>
            </div>
          </div>
          <div style="display: flex; gap: 15px; flex-wrap: wrap;">
            <div>
              <label for="notes-per-step">Notes per Step:</label>
              <select id="notes-per-step">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </div>
            <div>
              <label for="min-note">Min Note:</label>
              <select id="min-note"></select>
            </div>
            <div>
              <label for="max-note">Max Note:</label>
              <select id="max-note"></select>
            </div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label>Note Values:</label>
            <div id="note-values" style="display: flex; gap: 10px; flex-wrap: wrap;">
              <label><input type="checkbox" value="w"> Whole</label>
              <label><input type="checkbox" value="h"> Half</label>
              <label><input type="checkbox" value="q" checked> Quarter</label>
              <label><input type="checkbox" value="8"> Eighth</label>
              <label><input type="checkbox" value="16"> Sixteenth</label>
            </div>
            <div style="margin-top: 5px;">
              <label for="max-reach">Max Hand Reach (relative to Octave):</label>
              <select id="max-reach">
                <option value="5">-8 (Major Third / 4 half steps)</option>
                <option value="6">-7 (Perfect Fourth / 5 half steps)</option>
                <option value="7">-6 (Tritone / 6 half steps)</option>
                <option value="8">-5 (Perfect Fifth / 7 half steps)</option>
                <option value="9">-4 (Minor Sixth / 8 half steps)</option>
                <option value="10">-3 (Major Sixth / 9 half steps)</option>
                <option value="11">-2 (Minor Seventh / 10 half steps)</option>
                <option value="12">-1 (Major Seventh / 11 half steps)</option>
                <option value="13" selected>0 (Octave / 12 half steps)</option>
                <option value="14">+1 (Minor Ninth / 13 half steps)</option>
                <option value="15">+2 (Major Ninth / 14 half steps)</option>
                <option value="16">+3 (Minor Tenth / 15 half steps)</option>
                <option value="17">+4 (Major Tenth / 16 half steps)</option>
                <option value="18">+5 (Perfect Eleventh / 17 half steps)</option>
                <option value="19">+6 (Augmented Eleventh / 18 half steps)</option>
                <option value="20">+7 (Perfect Twelfth / 19 half steps)</option>
              </select>
            </div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label>Key Signatures:</label>
            <div id="key-signatures" style="display: flex; gap: 10px; flex-wrap: wrap; max-width: 800px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
              <!-- Checkboxes will be inserted here -->
            </div>
            <label style="display: flex; align-items: center; gap: 5px; margin-top: 5px; cursor: pointer;">
              <input type="checkbox" id="adaptive-learning"> Adaptive Learning (Drill Areas of Difficulty)
            </label>
          </div>
          <hr style="width: 100%; border: 0; border-top: 1px solid #eee; margin: 10px 0;">
          <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div id="midi-status" style="padding: 10px; border: 1px solid #ccc; display: inline-block;">
              MIDI: <span id="midi-device-name">No device connected</span>
              <div id="midi-indicator" style="width: 15px; height: 15px; background-color: red; border-radius: 50%; display: inline-block; margin-left: 5px; vertical-align: middle;"></div>
            </div>
            <button id="reset-all-settings" style="cursor: pointer; padding: 5px 12px; border-radius: 4px; border: 1px solid #ccc; background: #fff; font-weight: bold; color: #d32f2f;">Reset to Defaults</button>
          </div>
          <details id="midi-notes-details" style="margin-bottom: 10px;">
            <summary style="cursor: pointer; color: #666;">Show MIDI Notes</summary>
            <div id="note-display" style="margin-top: 10px; font-size: 24px; font-weight: bold;">
              Note: <span id="current-note">-</span>
            </div>
          </details>
        </div>
        </details>

        <details id="stats-details" style="border: 1px solid #ccc; border-radius: 8px; padding: 10px; background: #f9f9f9; width: fit-content; color: #777;">
          <summary style="cursor: pointer; font-weight: bold; text-align: center;">Stats</summary>
          <div id="stats-content" style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px; min-width: 150px;">
            <div style="display: flex; justify-content: space-between; gap: 20px;">
              <span>Notes Played:</span> <span id="stats-played" style="font-weight: bold;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; gap: 20px;">
              <span>Correct:</span> <span id="stats-correct" style="font-weight: bold; color: green;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; gap: 20px;">
              <span>Wrong:</span> <span id="stats-wrong" style="font-weight: bold; color: #c00;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; gap: 20px;">
              <span>Accuracy:</span> <span id="stats-accuracy" style="font-weight: bold;">0%</span>
            </div>
            <div style="display: flex; justify-content: space-between; gap: 20px;">
              <span>Current Streak:</span> <span id="stats-streak" style="font-weight: bold; color: green;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; gap: 20px;">
              <span>Best Streak:</span> <span id="stats-max-streak" style="font-weight: bold;">0</span>
            </div>
            <hr style="width: 100%; border: 0; border-top: 1px solid #eee; margin: 5px 0;">
            <div style="display: flex; justify-content: space-between; gap: 20px; font-size: 0.9em;">
              <span>Wrong Octave:</span> <span id="stats-wrong-octave" style="font-weight: bold;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; gap: 20px; font-size: 0.9em;">
              <span>Key Sig Error:</span> <span id="stats-key-error" style="font-weight: bold;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; gap: 20px; font-size: 0.9em;">
              <span>Avg Time:</span> <span id="stats-avg-time" style="font-weight: bold;">0s</span>
            </div>
            <button id="reset-stats" style="margin-top: 10px; cursor: pointer; padding: 5px 10px; border-radius: 4px; border: 1px solid #ccc; background: #fff;">Reset Stats</button>
          </div>
        </details>
      </div>
    </div>
    <div id="output" style="width: 100%; display: flex; justify-content: center;"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
