<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sight-reader</title>
  </head>
  <body class="app-shell">
    <main class="app-main">
      <header class="app-toolbar">
        <button
          id="settings-menu-toggle"
          type="button"
          class="icon-button icon-button-menu"
          aria-label="Open settings"
          aria-controls="settings-modal"
          aria-expanded="false"
        >
          <span class="menu-icon" aria-hidden="true">
            <span class="menu-icon-line"></span>
            <span class="menu-icon-line"></span>
            <span class="menu-icon-line"></span>
          </span>
        </button>

        <div class="stats-accordion-wrapper">
          <details id="stats-details" class="stats-accordion">
            <summary class="stats-summary" title="Open Stats">
              <svg class="stats-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 20V10"></path>
                <path d="M12 20V4"></path>
                <path d="M6 20V14"></path>
              </svg>
            </summary>
            <div id="stats-content" class="stats-container">
              <button id="stats-close" class="stats-close" aria-label="Close stats">&times;</button>
              <div class="stat-item">
                <span class="stat-label">Played</span>
                <span id="stats-played" class="stat-value">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Correct</span>
                <span id="stats-correct" class="stat-value stat-value-success">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Wrong</span>
                <span id="stats-wrong" class="stat-value stat-value-danger">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Accuracy</span>
                <span id="stats-accuracy" class="stat-value">0%</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Streak</span>
                <span id="stats-streak" class="stat-value stat-value-success">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Best</span>
                <span id="stats-max-streak" class="stat-value">0</span>
              </div>
              <div class="stat-item stat-item-subtle">
                <span class="stat-label">Octave Err</span>
                <span id="stats-wrong-octave" class="stat-value">0</span>
              </div>
              <div class="stat-item stat-item-subtle">
                <span class="stat-label">Key Err</span>
                <span id="stats-key-error" class="stat-value">0</span>
              </div>
              <div class="stat-item stat-item-subtle">
                <span class="stat-label">Avg Time</span>
                <span id="stats-avg-time" class="stat-value">0s</span>
              </div>
              <div class="stat-actions">
                <button id="reset-stats" class="reset-button" title="Reset Stats">Reset</button>
              </div>
            </div>
          </details>
        </div>

        <div class="toolbar-actions">
          <button id="sound-toggle" type="button" class="icon-button" aria-label="Sound on with reverb" title="Sound on with reverb">
            <span id="sound-toggle-icon" class="sound-icon" aria-hidden="true">
              <span class="sound-icon-speaker"></span>
              <span class="sound-icon-wave sound-icon-wave-primary"></span>
              <span class="sound-icon-wave sound-icon-wave-secondary"></span>
              <span class="sound-icon-wave sound-icon-wave-tertiary"></span>
              <span class="sound-icon-mute-slash"></span>
            </span>
          </button>
        </div>
      </header>
      <section class="panel-grid"></section>
      <section class="output-shell">
        <div id="output" class="score-output"></div>
      </section>
    </main>
    <div id="settings-modal-backdrop" class="modal-backdrop" hidden></div>
    <section
      id="settings-modal"
      class="settings-modal"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
      aria-labelledby="settings-modal-title"
      hidden
    >
      <div class="settings-modal-panel panel settings-panel">
        <div class="settings-modal-header">
          <h2 id="settings-modal-title" class="settings-modal-title">Settings</h2>
          <button id="settings-modal-close" type="button" class="icon-button settings-modal-close" aria-label="Close settings">
            Close
          </button>
        </div>
        <div id="controls" class="panel-content controls-content">
          <div class="control-grid">
            <div class="field-group">
              <label for="measures-per-line">Measures per Line:</label>
              <select id="measures-per-line" class="control-input">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
              </select>
            </div>
            <div class="field-group">
              <label for="lines">Lines:</label>
              <select id="lines" class="control-input">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </div>
            <div class="field-group">
              <label for="staff-type">Staff Type:</label>
              <select id="staff-type" class="control-input">
                <option value="grand" selected>Grand Staff</option>
                <option value="treble">Treble Clef</option>
                <option value="bass">Bass Clef</option>
              </select>
            </div>
          </div>
          <div class="control-grid">
            <div class="field-group">
              <label for="notes-per-step">Notes per Step:</label>
              <select id="notes-per-step" class="control-input">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </div>
            <div class="field-group field-group-note-range">
              <label for="note-range-selector">Note Range:</label>
              <div id="note-range-selector" class="note-range-selector" role="group" aria-describedby="note-range-selected-staff">
                <div class="note-range-selector-header">
                  <span id="note-range-selected-staff" class="note-range-selected-staff">Grand staff range</span>
                </div>
                <div class="note-range-selector-body">
                  <div id="note-range-visual" class="note-range-visual" aria-hidden="true"></div>
                </div>
                <div id="note-range-value-summary" class="note-range-value-summary">c2 - c6</div>
                <input id="min-note" type="hidden" value="C2" />
                <input id="max-note" type="hidden" value="C6" />
              </div>
            </div>
          </div>
          <div class="option-section">
            <label>Note Values:</label>
            <div id="note-values" class="option-grid">
              <label class="option-chip"><input type="checkbox" value="w"> Whole</label>
              <label class="option-chip"><input type="checkbox" value="h"> Half</label>
              <label class="option-chip"><input type="checkbox" value="q" checked> Quarter</label>
              <label class="option-chip"><input type="checkbox" value="8"> Eighth</label>
              <label class="option-chip"><input type="checkbox" value="16"> Sixteenth</label>
            </div>
            <div class="field-group">
              <label for="max-reach">Max Hand Reach (relative to Octave):</label>
              <select id="max-reach" class="control-input">
                <option value="5">-8 (Major Third / 4 half steps)</option>
                <option value="6">-7 (Perfect Fourth / 5 half steps)</option>
                <option value="7">-6 (Tritone / 6 half steps)</option>
                <option value="8">-5 (Perfect Fifth / 7 half steps)</option>
                <option value="9">-4 (Minor Sixth / 8 half steps)</option>
                <option value="10">-3 (Major Sixth / 9 half steps)</option>
                <option value="11">-2 (Minor Seventh / 10 half steps)</option>
                <option value="12">-1 (Major Seventh / 11 half steps)</option>
                <option value="13" selected>0 (Octave / 12 half steps)</option>
                <option value="14">+1 (Minor Ninth / 13 half steps)</option>
                <option value="15">+2 (Major Ninth / 14 half steps)</option>
                <option value="16">+3 (Minor Tenth / 15 half steps)</option>
                <option value="17">+4 (Major Tenth / 16 half steps)</option>
                <option value="18">+5 (Perfect Eleventh / 17 half steps)</option>
                <option value="19">+6 (Augmented Eleventh / 18 half steps)</option>
                <option value="20">+7 (Perfect Twelfth / 19 half steps)</option>
              </select>
            </div>
          </div>
          <div class="option-section">
            <label>Key Signatures:</label>
            <div id="key-signatures" class="option-grid key-signature-grid">
            </div>
            <label class="option-toggle">
              <input type="checkbox" id="adaptive-learning"> Adaptive Learning (Drill Areas of Difficulty)
            </label>
          </div>
          <hr class="panel-divider">
          <div class="status-row">
            <div id="midi-status" class="status-card">
              MIDI: <span id="midi-device-name">No device connected</span>
              <div id="midi-indicator" class="status-indicator"></div>
            </div>
            <button id="reset-all-settings" class="action-button action-button-danger">Reset to Defaults</button>
          </div>
          <details id="midi-notes-details" class="subpanel">
            <summary class="subpanel-summary">Show MIDI Notes</summary>
            <div id="note-display" class="note-display">
              Note: <span id="current-note">-</span>
            </div>
          </details>
        </div>
      </div>
    </section>
    <div id="keyboard-dock" class="keyboard-dock">
      <details id="piano-keyboard-details" class="keyboard-panel">
        <summary class="keyboard-summary" aria-label="Keyboard">
          <span class="keyboard-summary-label">Keyboard</span>
        </summary>
        <div class="keyboard-scroll">
          <div id="piano-keyboard" class="keyboard-root"></div>
        </div>
      </details>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
