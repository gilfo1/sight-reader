<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VexFlow Grand Staff</title>
  </head>
  <body style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 20px;">
    <div style="width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: flex-start;">
      <div id="controls" style="margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap;">
        <div>
          <label for="measures-per-line">Measures per Line:</label>
          <select id="measures-per-line">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
        <div>
          <label for="lines">Lines:</label>
          <select id="lines">
            <option value="1" selected>1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
        <div>
          <label for="staff-type">Staff Type:</label>
          <select id="staff-type">
            <option value="grand" selected>Grand Staff</option>
            <option value="treble">Treble Clef</option>
            <option value="bass">Bass Clef</option>
          </select>
        </div>
      </div>
      <div id="midi-status" style="margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; display: inline-block;">
        MIDI: <span id="midi-device-name">No device connected</span>
        <div id="midi-indicator" style="width: 15px; height: 15px; background-color: red; border-radius: 50%; display: inline-block; margin-left: 5px; vertical-align: middle;"></div>
      </div>
      <details style="margin-bottom: 10px;">
        <summary style="cursor: pointer; color: #666;">Show MIDI Notes</summary>
        <div id="note-display" style="margin-top: 10px; font-size: 24px; font-weight: bold;">
          Note: <span id="current-note">-</span>
        </div>
      </details>
    </div>
    <div id="output" style="width: 100%; display: flex; justify-content: center;"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
